<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Personnalité Financeiro</title>
<meta name="theme-color" content="#EC7000"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

select option{background:#1a1a1a;color:#fff}

<body>
<div id="root"></div>
<script>
const e=React.createElement;
const{useState,useEffect,useMemo,useReducer,useCallback}=React;
const{PieChart,Pie,Cell,Tooltip,Legend,ResponsiveContainer,BarChart,Bar,XAxis,YAxis,CartesianGrid,LineChart,Line}=Recharts;

const CATS=["Alimentação","Transporte","Saúde","Lazer","Educação","Moradia","Vestuário","Tecnologia","Viagem","Outros"];
const PAYS=["Crédito Personnalité","Débito","Pix","Dinheiro","Outros"];
const COLORS={"Alimentação":"#EC7000","Transporte":"#c9a84c","Saúde":"#4CAF50","Lazer":"#2196F3","Educação":"#9C27B0","Moradia":"#FF5722","Vestuário":"#E91E63","Tecnologia":"#00BCD4","Viagem":"#8BC34A","Outros":"#9E9E9E"};

const autocat=d=>{
  const u=d.toUpperCase();
  if(/IFOOD|RAPPI|MCDON|BURGER|PIZZA|PADARIA|MERCADO|SUPER|CARREFOUR|STARBUCKS|LANCHE|RESTAUR/.test(u))return"Alimentação";
  if(/UBER|99APP|TAXI|METRO|TREM|ONIBUS|PASSAGEM|POSTO|IPIRANGA|SHELL|COMBUSTIV/.test(u))return"Transporte";
  if(/FARMAC|DROGARIA|CLINICA|HOSPIT|MEDICO|UNIMED|AMIL/.test(u))return"Saúde";
  if(/NETFLIX|SPOTIFY|STEAM|CINEMA|TEATRO|PRIME|DISNEY|HBO|GLOBOPLAY/.test(u))return"Lazer";
  if(/ESCOLA|FACUL|CURSO|UDEMY|ALURA|LIVRO/.test(u))return"Educação";
  if(/ALUGUEL|CONDOMIN|LUZ|AGUA|GAS|INTERNET|CLARO|VIVO|TIM|OI/.test(u))return"Moradia";
  if(/ZARA|RENNER|MARISA|RIACHUELO|SHEIN|NIKE|ADIDAS/.test(u))return"Vestuário";
  if(/AMAZON|AMERICANAS|MAGAZINE|SHOPEE|MERCADO.?LIVRE|SAMSUNG|APPLE|KABUM/.test(u))return"Tecnologia";
  if(/HOTEL|AIRBNB|LATAM|GOL|AZUL|BOOKING|DECOLAR/.test(u))return"Viagem";
  return"Outros";
};

const makeMock=()=>{
  const now=new Date();const data=[];
  const items=[["IFOOD*RESTAURANTE","Alimentação"],["UBER TRIP","Transporte"],["NETFLIX.COM","Lazer"],["FARMACIA DROGASIL","Saúde"],["AMAZON.COM.BR","Tecnologia"],["SUPERMERCADO EXTRA","Alimentação"],["POSTO IPIRANGA","Transporte"],["SPOTIFY","Lazer"],["SMART FIT","Saúde"],["CURSO UDEMY","Educação"],["ZARA BRASIL","Vestuário"],["LATAM AIRLINES","Viagem"],["STARBUCKS","Alimentação"],["99APP","Transporte"],["ALUGUEL","Moradia"],["CLARO INTERNET","Moradia"]];
  for(let m=5;m>=0;m--){
    const md=new Date(now.getFullYear(),now.getMonth()-m,1);
    for(let i=0;i<10+Math.floor(Math.random()*6);i++){
      const[desc,cat]=items[Math.floor(Math.random()*items.length)];
      data.push({id:`m${m}i${i}`,date:new Date(md.getFullYear(),md.getMonth(),1+Math.floor(Math.random()*27)).toISOString().split("T")[0],description:desc,category:cat,amount:parseFloat((20+Math.random()*480).toFixed(2)),payment:"Crédito Personnalité",origin:"exemplo"});
    }
  }
  return data.sort((a,b)=>b.date.localeCompare(a.date));
};

function reducer(state,action){
  let next;
  switch(action.type){
    case"LOAD":return{...state,transactions:action.payload,loaded:true};
    case"ADD":next=[action.payload,...state.transactions];localStorage.setItem("fin_v2",JSON.stringify(next));return{...state,transactions:next};
    case"ADDMANY":next=[...action.payload,...state.transactions];localStorage.setItem("fin_v2",JSON.stringify(next));return{...state,transactions:next};
    case"DEL":next=state.transactions.filter(t=>t.id!==action.payload);localStorage.setItem("fin_v2",JSON.stringify(next));return{...state,transactions:next};
    case"UPD":next=state.transactions.map(t=>t.id===action.payload.id?action.payload:t);localStorage.setItem("fin_v2",JSON.stringify(next));return{...state,transactions:next};
    default:return state;
  }
}

const fmt=v=>"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2});
const tt={background:"#1e1e1e",border:"1px solid #333",borderRadius:8,color:"#fff",fontSize:12};
const INP={width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:14,outline:"none"};
const BOX=(extra)=>({background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:16,...extra});

// ── DASHBOARD ──
function Dashboard({transactions}){
  const now=new Date();
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const MN=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const MS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  const fil=useMemo(()=>transactions.filter(t=>{const d=new Date(t.date+"T12:00:00");return d.getMonth()===sm&&d.getFullYear()===sy;}),[transactions,sm,sy]);
  const prev=useMemo(()=>{const p=new Date(sy,sm-1,1);return transactions.filter(t=>{const d=new Date(t.date+"T12:00:00");return d.getMonth()===p.getMonth()&&d.getFullYear()===p.getFullYear();});},[transactions,sm,sy]);
  const total=fil.reduce((s,t)=>s+t.amount,0);
  const ptotal=prev.reduce((s,t)=>s+t.amount,0);
  const vari=ptotal>0?((total-ptotal)/ptotal*100):0;

  const byCat=useMemo(()=>{const m={};fil.forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).map(([name,value])=>({name,value:parseFloat(value.toFixed(2))})).sort((a,b)=>b.value-a.value);},[fil]);
  const topCat=byCat[0]?.name||"—";

  const m6=useMemo(()=>{const r=[];for(let i=5;i>=0;i--){const d=new Date(sy,sm-i,1);const mo=d.getMonth(),yr=d.getFullYear();const s=transactions.filter(t=>{const td=new Date(t.date+"T12:00:00");return td.getMonth()===mo&&td.getFullYear()===yr;}).reduce((s,t)=>s+t.amount,0);r.push({month:MS[mo],total:parseFloat(s.toFixed(2))});}return r;},[transactions,sm,sy]);

  return e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
    e("div",{style:{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}},
      e("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",display:"flex",gap:8}},
        e("select",{value:sm,onChange:ev=>setSm(+ev.target.value),style:{background:"transparent",color:"#EC7000",fontWeight:700,fontSize:13,border:"none",outline:"none"}},MN.map((m,i)=>e("option",{key:i,value:i},m))),
        e("select",{value:sy,onChange:ev=>setSy(+ev.target.value),style:{background:"transparent",color:"#EC7000",fontWeight:700,fontSize:13,border:"none",outline:"none"}},[2023,2024,2025,2026].map(y=>e("option",{key:y,value:y},y)))
      ),
      e("span",{style:{fontSize:11,color:"#444"}},fil.length+" transações")
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      ...[
        ["Total do mês",fmt(total),"#EC7000"],
        ["vs. mês anterior",(vari>=0?"+":"")+vari.toFixed(1)+"%",vari>=0?"#ef4444":"#22c55e"],
        ["Transações",fil.length,"#c9a84c"],
        ["Maior categoria",topCat,COLORS[topCat]||"#aaa"],
      ].map(([label,value,accent])=>
        e("div",{key:label,style:BOX()},
          e("div",{style:{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},label),
          e("div",{style:{fontSize:16,fontWeight:700,color:accent}},value)
        )
      )
    ),
    e("div",{style:BOX()},
      e("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Por Categoria"),
      byCat.length===0
        ?e("div",{style:{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"#333"}},"Sem dados no período")
        :e(ResponsiveContainer,{width:"100%",height:200},
            e(PieChart,null,
              e(Pie,{data:byCat,dataKey:"value",nameKey:"name",cx:"50%",cy:"50%",outerRadius:75,innerRadius:40},
                byCat.map((d,i)=>e(Cell,{key:i,fill:COLORS[d.name]||"#999"}))
              ),
              e(Tooltip,{formatter:fmt,contentStyle:tt}),
              e(Legend,{formatter:v=>e("span",{style:{color:"#aaa",fontSize:11}},v)})
            )
          )
    ),
    e("div",{style:BOX()},
      e("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Últimos 6 Meses"),
      e(ResponsiveContainer,{width:"100%",height:180},
        e(BarChart,{data:m6,margin:{left:-20,top:4,right:4}},
          e(CartesianGrid,{strokeDasharray:"3 3",stroke:"#222"}),
          e(XAxis,{dataKey:"month",tick:{fill:"#555",fontSize:11}}),
          e(YAxis,{tick:{fill:"#555",fontSize:11}}),
          e(Tooltip,{formatter:fmt,contentStyle:tt}),
          e(Bar,{dataKey:"total",fill:"#EC7000",radius:[4,4,0,0]})
        )
      )
    ),
    e("div",{style:BOX()},
      e("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Evolução de Gastos"),
      e(ResponsiveContainer,{width:"100%",height:160},
        e(LineChart,{data:m6,margin:{left:-20,right:12,top:4}},
          e(CartesianGrid,{strokeDasharray:"3 3",stroke:"#222"}),
          e(XAxis,{dataKey:"month",tick:{fill:"#555",fontSize:11}}),
          e(YAxis,{tick:{fill:"#555",fontSize:11}}),
          e(Tooltip,{formatter:fmt,contentStyle:tt}),
          e(Line,{type:"monotone",dataKey:"total",stroke:"#c9a84c",strokeWidth:2.5,dot:{fill:"#c9a84c",r:4}})
        )
      )
    ),
    byCat.length>0&&e("div",{style:BOX()},
      e("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Detalhamento"),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        byCat.map((c,i)=>e("div",{key:i,style:{display:"flex",alignItems:"center",gap:8}},
          e("div",{style:{width:8,height:8,borderRadius:"50%",background:COLORS[c.name],flexShrink:0}}),
          e("span",{style:{fontSize:12,color:"#aaa",width:88,flexShrink:0}},c.name),
          e("div",{style:{flex:1,height:5,background:"#222",borderRadius:3,overflow:"hidden"}},
            e("div",{style:{height:"100%",width:(c.value/total*100).toFixed(0)+"%",background:COLORS[c.name]}})
          ),
          e("span",{style:{fontSize:12,fontWeight:700,color:"#fff",width:88,textAlign:"right"}},fmt(c.value))
        ))
      )
    )
  );
}

// ── ADD TX ──
function AddTx({dispatch,toast}){
  const empty={date:new Date().toISOString().split("T")[0],description:"",category:"Alimentação",amount:"",payment:"Crédito Personnalité"};
  const[f,setF]=useState(empty);
  const set=k=>ev=>setF(p=>({...p,[k]:ev.target.value}));
  const lbl=t=>e("label",{style:{fontSize:11,color:"#555",display:"block",marginBottom:4}},t);
  const submit=()=>{
    if(!f.description||!f.amount||!f.date){toast("Preencha todos os campos","err");return;}
    dispatch({type:"ADD",payload:{...f,amount:parseFloat(f.amount),id:"tx"+Date.now(),origin:"manual"}});
    toast("Adicionado!","ok");setF(empty);
  };
  return e("div",{style:BOX()},
    e("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:16}},"Nova Transação"),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
      e("div",null,lbl("Data *"),e("input",{type:"date",value:f.date,onChange:set("date"),style:INP})),
      e("div",null,lbl("Valor R$ *"),e("input",{type:"number",step:"0.01",min:"0",placeholder:"0,00",value:f.amount,onChange:set("amount"),style:INP})),
      e("div",{style:{gridColumn:"1/-1"}},lbl("Descrição *"),e("input",{type:"text",placeholder:"Ex: Supermercado Extra",value:f.description,onChange:set("description"),style:INP})),
      e("div",null,lbl("Categoria"),e("select",{value:f.category,onChange:set("category"),style:INP},CATS.map(c=>e("option",{key:c,value:c},c)))),
      e("div",null,lbl("Pagamento"),e("select",{value:f.payment,onChange:set("payment"),style:INP},PAYS.map(p=>e("option",{key:p,value:p},p))))
    ),
    e("button",{onClick:submit,style:{marginTop:14,width:"100%",background:"#EC7000",color:"#fff",border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}},"+ Adicionar Transação")
  );
}

// ── LIST ──
function TxList({transactions,dispatch,toast}){
  const[search,setSearch]=useState("");
  const[fcat,setFcat]=useState("Todas");
  const[editId,setEditId]=useState(null);
  const[ef,setEf]=useState({});
  const fil=useMemo(()=>transactions.filter(t=>(fcat==="Todas"||t.category===fcat)&&t.description.toLowerCase().includes(search.toLowerCase())),[transactions,fcat,search]);
  const startEdit=t=>{setEditId(t.id);setEf({...t});};
  const save=()=>{dispatch({type:"UPD",payload:{...ef,amount:parseFloat(ef.amount)}});toast("Atualizado!","ok");setEditId(null);};
  const ei={background:"#0d0d0d",border:"1px solid #333",borderRadius:6,padding:"6px 8px",color:"#fff",fontSize:12,outline:"none",width:"100%"};
  return e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
      e("div",{style:{flex:1,minWidth:140,display:"flex",alignItems:"center",gap:8,background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px"}},
        e("span",{style:{color:"#444"}},"🔍"),
        e("input",{value:search,onChange:ev=>setSearch(ev.target.value),placeholder:"Buscar...",style:{background:"transparent",color:"#fff",fontSize:13,border:"none",outline:"none",width:"100%"}})
      ),
      e("select",{value:fcat,onChange:ev=>setFcat(ev.target.value),style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:13,outline:"none"}},
        e("option",{value:"Todas"},"Todas"),
        CATS.map(c=>e("option",{key:c,value:c},c))
      )
    ),
    e("span",{style:{fontSize:11,color:"#444"}},fil.length+" transações"),
    e("div",{style:{display:"flex",flexDirection:"column",gap:8,maxHeight:500,overflowY:"auto"}},
      fil.length===0&&e("div",{style:{...BOX(),textAlign:"center",color:"#444",fontSize:13,padding:32}},"Nenhuma transação encontrada"),
      fil.map(t=>e("div",{key:t.id,style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:10,padding:12}},
        editId===t.id
          ?e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              e("input",{value:ef.description,onChange:ev=>setEf(p=>({...p,description:ev.target.value})),style:{...ei,gridColumn:"1/-1"}}),
              e("input",{type:"number",value:ef.amount,onChange:ev=>setEf(p=>({...p,amount:ev.target.value})),style:ei}),
              e("select",{value:ef.category,onChange:ev=>setEf(p=>({...p,category:ev.target.value})),style:ei},CATS.map(c=>e("option",{key:c,value:c},c))),
              e("div",{style:{gridColumn:"1/-1",display:"flex",gap:8}},
                e("button",{onClick:save,style:{flex:1,background:"#16a34a",color:"#fff",border:"none",borderRadius:6,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer"}},"✓ Salvar"),
                e("button",{onClick:()=>setEditId(null),style:{flex:1,background:"#2a2a2a",color:"#fff",border:"none",borderRadius:6,padding:"9px",fontSize:13,cursor:"pointer"}},"✕ Cancelar")
              )
            )
          :e("div",{style:{display:"flex",alignItems:"center",gap:10}},
              e("div",{style:{width:8,height:8,borderRadius:"50%",background:COLORS[t.category],flexShrink:0}}),
              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{fontSize:13,fontWeight:500,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description),
                e("div",{style:{display:"flex",gap:8,marginTop:2}},
                  e("span",{style:{fontSize:11,color:"#444"}},new Date(t.date+"T12:00:00").toLocaleDateString("pt-BR")),
                  e("span",{style:{fontSize:10,padding:"1px 6px",borderRadius:4,background:COLORS[t.category]+"22",color:COLORS[t.category]}},t.category)
                )
              ),
              e("span",{style:{fontWeight:700,color:"#fff",fontSize:13,flexShrink:0}},fmt(t.amount)),
              e("button",{onClick:()=>startEdit(t),style:{background:"none",border:"none",cursor:"pointer",color:"#555",padding:4,fontSize:16}},"✏️"),
              e("button",{onClick:()=>{dispatch({type:"DEL",payload:t.id});toast("Excluído","ok");},style:{background:"none",border:"none",cursor:"pointer",color:"#555",padding:4,fontSize:16}},"🗑️")
            )
      ))
    )
  );
}

// ── INVOICE ──
function Invoice({dispatch,toast}){
  const[step,setStep]=useState("up");
  const[prev,setPrev]=useState([]);
  const ex=()=>{
    setPrev([
      {id:"e1",date:"2026-05-10",description:"IFOOD*RESTAURANTE",category:"Alimentação",amount:52.90,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"e2",date:"2026-05-12",description:"UBER TRIP SAO PAULO",category:"Transporte",amount:34.50,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"e3",date:"2026-05-14",description:"NETFLIX.COM",category:"Lazer",amount:39.90,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"e4",date:"2026-05-15",description:"FARMACIA DROGASIL",category:"Saúde",amount:87.30,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"e5",date:"2026-05-18",description:"SUPERMERCADO EXTRA",category:"Alimentação",amount:312.75,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"e6",date:"2026-05-20",description:"POSTO IPIRANGA",category:"Transporte",amount:180.00,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"e7",date:"2026-05-22",description:"AMAZON.COM.BR",category:"Tecnologia",amount:299.00,payment:"Crédito Personnalité",origin:"fatura"},
    ]);
    setStep("prev");
  };
  const importAll=()=>{dispatch({type:"ADDMANY",payload:prev});toast(prev.length+" transações importadas!","ok");setPrev([]);setStep("up");};
  if(step==="prev")return e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      e("span",{style:{fontSize:14,fontWeight:600,color:"#fff"}},prev.length+" lançamentos"),
      e("button",{onClick:()=>{setPrev([]);setStep("up");},style:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16}},"✕")
    ),
    e("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:380,overflowY:"auto"}},
      prev.map(t=>e("div",{key:t.id,style:{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:8,padding:10,display:"flex",alignItems:"center",gap:8}},
        e("div",{style:{width:6,height:6,borderRadius:"50%",background:COLORS[t.category],flexShrink:0}}),
        e("div",{style:{flex:1,minWidth:0}},
          e("div",{style:{fontSize:12,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description),
          e("span",{style:{fontSize:10,color:COLORS[t.category]}},t.category)
        ),
        e("span",{style:{fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}},fmt(t.amount)),
        e("button",{onClick:()=>setPrev(p=>p.filter(x=>x.id!==t.id)),style:{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:14}},"✕")
      ))
    ),
    e("button",{onClick:importAll,style:{background:"#EC7000",color:"#fff",border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}},"✓ Importar "+prev.length+" transações")
  );
  return e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    e("div",{style:{...BOX(),textAlign:"center",padding:40}},
      e("div",{style:{fontSize:40,marginBottom:12}},"📄"),
      e("p",{style:{color:"#fff",fontSize:14,fontWeight:600,marginBottom:4}},"Fatura Itaú Personnalité"),
      e("p",{style:{color:"#444",fontSize:12,marginBottom:16}},"Upload do PDF da fatura")
    ),
    e("button",{onClick:ex,style:{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#c9a84c",padding:"13px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer"}},"⭐ Carregar fatura de exemplo"),
    e("div",{style:BOX()},
      e("p",{style:{fontSize:11,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:1}},"Como usar"),
      ["Baixe sua fatura no app Itaú","Salve o PDF no celular","Use 'Carregar exemplo' para testar","Em breve: upload real do PDF"].map((s,i)=>e("p",{key:i,style:{fontSize:12,color:"#444",marginBottom:4}},"• "+s))
    )
  );
}

// ── EXPORT ──
function Export({transactions,toast}){
  const exp=()=>{
    if(!transactions.length){toast("Nenhuma transação","err");return;}
    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.aoa_to_sheet([["Data","Descrição","Categoria","Valor","Pagamento","Origem"],...transactions.map(t=>[t.date,t.description,t.category,t.amount,t.payment,t.origin])]);
    XLSX.utils.book_append_sheet(wb,ws1,"Transações");
    const cm={};transactions.forEach(t=>{if(!cm[t.category])cm[t.category]={total:0,count:0};cm[t.category].total+=t.amount;cm[t.category].count++;});
    const gt=transactions.reduce((s,t)=>s+t.amount,0);
    const ws2=XLSX.utils.aoa_to_sheet([["Categoria","Total R$","% Total","Qtd"],...Object.entries(cm).sort((a,b)=>b[1].total-a[1].total).map(([c,d])=>[c,d.total.toFixed(2),((d.total/gt)*100).toFixed(1)+"%",d.count])]);
    XLSX.utils.book_append_sheet(wb,ws2,"Por Categoria");
    const mm={};transactions.forEach(t=>{const m=t.date.slice(0,7);mm[m]=(mm[m]||0)+t.amount;});
    const ws3=XLSX.utils.aoa_to_sheet([["Mês","Total R$"],...Object.entries(mm).sort().map(([m,v])=>[m,v.toFixed(2)])]);
    XLSX.utils.book_append_sheet(wb,ws3,"Mensal");
    XLSX.writeFile(wb,"financeiro_"+new Date().toISOString().slice(0,10)+".xlsx");
    toast("Planilha exportada!","ok");
  };
  return e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    e("div",{style:{...BOX(),textAlign:"center"}},
      e("div",{style:{fontSize:40,marginBottom:12}},"📊"),
      e("p",{style:{fontSize:14,fontWeight:600,color:"#fff",marginBottom:4}},"Exportar para Excel"),
      e("p",{style:{fontSize:12,color:"#444",marginBottom:16}},"Planilha .xlsx com 3 abas completas"),
      e("button",{onClick:exp,style:{background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"13px 32px",fontSize:14,fontWeight:700,cursor:"pointer"}},"⬇ Baixar Excel")
    ),
    e("div",{style:BOX()},
      [["Aba 1","Todas as transações"],["Aba 2","Resumo por categoria"],["Aba 3","Evolução mensal"]].map(([t,d])=>
        e("div",{key:t,style:{display:"flex",gap:10,marginBottom:8}},
          e("span",{style:{fontSize:11,fontWeight:700,color:"#EC7000",width:36,flexShrink:0}},t),
          e("span",{style:{fontSize:12,color:"#444"}},d)
        )
      )
    )
  );
}

// ── TOAST ──
function Toast({toasts}){
  return e("div",{style:{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8}},
    toasts.map(t=>e("div",{key:t.id,style:{padding:"10px 14px",borderRadius:8,fontSize:13,fontWeight:600,background:t.type==="ok"?"#16a34a":"#dc2626",color:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,0.5)"}},t.msg))
  );
}

// ── APP ──
function App(){
  const[state,dispatch]=useReducer(reducer,{transactions:[],loaded:false});
  const[tab,setTab]=useState("dashboard");
  const[toasts,setToasts]=useState([]);
  const[banner,setBanner]=useState(true);

  const toast=useCallback((msg,type)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);

  useEffect(()=>{
    try{const s=localStorage.getItem("fin_v2");dispatch({type:"LOAD",payload:s?JSON.parse(s):makeMock()});}
    catch{dispatch({type:"LOAD",payload:makeMock()});}
  },[]);

  const nav=[{id:"dashboard",label:"Dashboard",ico:"📊"},{id:"add",label:"Adicionar",ico:"➕"},{id:"list",label:"Extrato",ico:"📋"},{id:"invoice",label:"Fatura",ico:"📄"},{id:"export",label:"Exportar",ico:"⬇"}];
  const titles={dashboard:"Dashboard",add:"Nova Transação",list:"Extrato",invoice:"Fatura",export:"Exportar"};

  return e("div",{style:{minHeight:"100vh",background:"#111",display:"flex",flexDirection:"column"}},
    e("header",{style:{background:"#0d0d0d",borderBottom:"1px solid #1e1e1e",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:30}},
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e("div",{style:{width:30,height:30,background:"#EC7000",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}},"P"),
        e("div",null,
          e("div",{style:{fontSize:13,fontWeight:700}},"Personnalité"),
          e("div",{style:{fontSize:10,color:"#444"}},"Gestão Financeira")
        )
      ),
      e("span",{style:{fontSize:14,fontWeight:600}},titles[tab]),
      e("span",{style:{fontSize:11,color:"#333"}},state.transactions.length+" itens")
    ),
    banner&&e("div",{style:{background:"#1a0f00",borderBottom:"1px solid rgba(236,112,0,0.3)",padding:"8px 14px",display:"flex",alignItems:"center",gap:10}},
      e("span",{style:{fontSize:11,color:"#aaa",flex:1}},
        e("span",{style:{color:"#EC7000",fontWeight:700}},"Instalar: "),
        "⋮ → Adicionar à tela inicial"
      ),
      e("button",{onClick:()=>setBanner(false),style:{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:18}},"×")
    ),
    e("main",{style:{flex:1,padding:16,overflowY:"auto",paddingBottom:80}},
      !state.loaded
        ?e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:"#444",fontSize:14,gap:8}},
            e("span",{className:"spin"},"⟳")," Carregando..."
          )
        :e("div",null,
            tab==="dashboard"&&e(Dashboard,{transactions:state.transactions}),
            tab==="add"&&e(AddTx,{dispatch,toast}),
            tab==="list"&&e(TxList,{transactions:state.transactions,dispatch,toast}),
            tab==="invoice"&&e(Invoice,{dispatch,toast}),
            tab==="export"&&e(Export,{transactions:state.transactions,toast})
          )
    ),
    e("nav",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0d0d0d",borderTop:"1px solid #1e1e1e",display:"flex",zIndex:40}},
      nav.map(n=>e("button",{key:n.id,onClick:()=>setTab(n.id),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 4px",background:"none",border:"none",cursor:"pointer",color:tab===n.id?"#EC7000":"#444"}},
        e("span",{style:{fontSize:20}},n.ico),
        e("span",{style:{fontSize:9,fontWeight:tab===n.id?700:400}},n.label)
      ))
    ),
    e(Toast,{toasts})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>

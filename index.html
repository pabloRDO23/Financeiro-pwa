<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Personnalité Financeiro</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#EC7000"/>
  <meta name="description" content="Gestão financeira pessoal Itaú Personnalité"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Financeiro"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json"/>

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png"/>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23EC7000'/><text x='50%' y='55%' font-size='18' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='sans-serif' font-weight='bold'>₢</text></svg>"/>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { background: #111; overflow-x: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Recharts -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>

  <!-- SheetJS -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Lucide React -->
  <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js"></script>

  <!-- Babel standalone (to transpile JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load App -->
  <script type="text/babel" data-type="module" src="/app.jsx"></script>

  <!-- Mount -->
  <script>
    window.addEventListener('load', () => {
      // Small delay to let Babel transpile
      setTimeout(() => {
        try {
          ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(window.App?.default || window.App)
          );
        } catch(e) {
          console.error('Mount error:', e);
        }
      }, 100);
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>

const cat=d=>{
  const u=d.toUpperCase();
  if(/IFOOD|RAPPI|UBER.?EATS|MCDON|BURGER|PIZZA|REST|PADARIA|MERCADO|SUPER|CARREFOUR|STARBUCKS|CACAU/.test(u))return"Alimentação";
  if(/UBER|99APP|TAXI|METRO|TREM|ONIBUS|PASSAGEM|SHELL|POSTO|IPIRANGA|AUTOPASS/.test(u))return"Transporte";
  if(/FARMAC|DROGARIA|CLINICA|HOSPIT|MEDICO|UNIMED|AMIL|SULAMERICA/.test(u))return"Saúde";
  if(/NETFLIX|SPOTIFY|STEAM|CINEMA|TEATRO|SHOW|AMAZON.?PRIME|DISNEY|HBO|GLOBOPLAY/.test(u))return"Lazer";
  if(/ESCOLA|FACUL|CURSO|UDEMY|COURSERA|LIVRO|ALURA|FIAP/.test(u))return"Educação";
  if(/ALUGUEL|CONDOMIN|LUZ|AGUA|GAS|INTERNET|CLARO|VIVO|TIM|OI|ENEL/.test(u))return"Moradia";
  if(/ZARA|RENNER|MARISA|RIACHUELO|SHEIN|NIKE|ADIDAS|AREZZO/.test(u))return"Vestuário";
  if(/AMAZON|AMERICANAS|MAGAZINE|SHOPEE|MERCADO.?LIVRE|SAMSUNG|APPLE|KABUM/.test(u))return"Tecnologia";
  if(/HOTEL|AIRBNB|LATAM|GOL|AZUL|BOOKING|DECOLAR/.test(u))return"Viagem";
  return"Outros";
};

const mockData=()=>{
  const now=new Date();const data=[];
  const itens=[["IFOOD*RESTAURANTE","Alimentação"],["UBER TRIP","Transporte"],["NETFLIX.COM","Lazer"],["FARMACIA DROGASIL","Saúde"],["AMAZON.COM.BR","Tecnologia"],["SUPERMERCADO EXTRA","Alimentação"],["POSTO IPIRANGA","Transporte"],["SPOTIFY","Lazer"],["SMART FIT","Saúde"],["CURSO UDEMY","Educação"],["ZARA BRASIL","Vestuário"],["LATAM AIRLINES","Viagem"],["STARBUCKS","Alimentação"],["99APP","Transporte"],["ALUGUEL","Moradia"],["CLARO INTERNET","Moradia"]];
  for(let m=5;m>=0;m--){
    const md=new Date(now.getFullYear(),now.getMonth()-m,1);
    const n=8+Math.floor(Math.random()*8);
    for(let i=0;i<n;i++){
      const[desc,c]=itens[Math.floor(Math.random()*itens.length)];
      const day=1+Math.floor(Math.random()*27);
      data.push({id:`m${m}i${i}`,date:new Date(md.getFullYear(),md.getMonth(),day).toISOString().split("T")[0],description:desc,category:c,amount:parseFloat((20+Math.random()*480).toFixed(2)),payment:"Crédito Personnalité",origin:"exemplo"});
    }
  }
  return data.sort((a,b)=>b.date.localeCompare(a.date));
};

function reducer(state,action){
  let next;
  switch(action.type){
    case"LOAD":return{...state,transactions:action.payload,loaded:true};
    case"ADD":next=[action.payload,...state.transactions];localStorage.setItem("fin_v1",JSON.stringify(next));return{...state,transactions:next};
    case"ADD_MANY":next=[...action.payload,...state.transactions];localStorage.setItem("fin_v1",JSON.stringify(next));return{...state,transactions:next};
    case"DEL":next=state.transactions.filter(t=>t.id!==action.payload);localStorage.setItem("fin_v1",JSON.stringify(next));return{...state,transactions:next};
    case"UPD":next=state.transactions.map(t=>t.id===action.payload.id?action.payload:t);localStorage.setItem("fin_v1",JSON.stringify(next));return{...state,transactions:next};
    default:return state;
  }
}

}

      card("vs. mês anterior",(vari>=0?"+":"")+vari.toFixed(1)+"%",vari>=0?"#ef4444":"#22c55e"),
      card("Transações",fil.length,"#c9a84c"),
      card("Maior categoria",topCat,COLORS[topCat]||"#fff")

    React.createElement("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:16}},
      React.createElement("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Por Categoria"),

              React.createElement(Tooltip,{formatter:fmt,contentStyle:ttStyle}),
              React.createElement(Legend,{formatter:v=>React.createElement("span",{style:{color:"#aaa",fontSize:11}},v)})
            )
          )
    ),
    React.createElement("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:16}},
      React.createElement("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Últimos 6 Meses"),

      React.createElement("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:12}},"Detalhamento"),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        byCat.map((c,i)=>React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement("div",{style:{width:8,height:8,borderRadius:"50%",background:COLORS[c.name],flexShrink:0}}),

          React.createElement("div",{style:{flex:1,height:6,background:"#222",borderRadius:3,overflow:"hidden"}},
            React.createElement("div",{style:{height:"100%",width:(c.value/total*100).toFixed(0)+"%",background:COLORS[c.name],borderRadius:3}})
          ),
          React.createElement("span",{style:{fontSize:12,fontWeight:700,color:"#fff",width:90,textAlign:"right"}},fmt(c.value))
        ))

    )

function AddTx({dispatch,addToast}){
  const empty={date:new Date().toISOString().split("T")[0],description:"",category:"Alimentação",amount:"",payment:"Crédito Personnalité"};
  const[form,setForm]=useState(empty);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const submit=()=>{
    if(!form.description||!form.amount||!form.date){addToast("Preencha todos os campos","error");return;}
    dispatch({type:"ADD",payload:{...form,amount:parseFloat(form.amount),id:"tx"+Date.now(),origin:"manual"}});
    addToast("Transação adicionada!","success");setForm(empty);
  };
  const label=t=>React.createElement("label",{style:{fontSize:11,color:"#555",display:"block",marginBottom:4}},t);
  return React.createElement("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:20}},
    React.createElement("p",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:16}},"Nova Transação"),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
      React.createElement("div",null,label("Data *"),React.createElement("input",{type:"date",value:form.date,onChange:set("date"),style:inp})),
      React.createElement("div",null,label("Valor R$ *"),React.createElement("input",{type:"number",step:"0.01",min:"0",placeholder:"0,00",value:form.amount,onChange:set("amount"),style:inp})),
      React.createElement("div",{style:{gridColumn:"1/-1"}},label("Descrição *"),React.createElement("input",{type:"text",placeholder:"Ex: Supermercado Extra",value:form.description,onChange:set("description"),style:inp})),

              )

function Invoice({dispatch,addToast}){
  const[step,setStep]=useState("upload");

  const loadEx=()=>{
    setPreview([
      {id:"fe1",date:"2026-05-10",description:"IFOOD*RESTAURANTE JPN",category:"Alimentação",amount:52.90,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"fe2",date:"2026-05-12",description:"UBER TRIP SAO PAULO",category:"Transporte",amount:34.50,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"fe3",date:"2026-05-14",description:"NETFLIX.COM",category:"Lazer",amount:39.90,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"fe4",date:"2026-05-15",description:"FARMACIA DROGASIL",category:"Saúde",amount:87.30,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"fe5",date:"2026-05-18",description:"SUPERMERCADO EXTRA",category:"Alimentação",amount:312.75,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"fe6",date:"2026-05-20",description:"POSTO IPIRANGA SP",category:"Transporte",amount:180.00,payment:"Crédito Personnalité",origin:"fatura"},
      {id:"fe7",date:"2026-05-22",description:"AMAZON.COM.BR",category:"Tecnologia",amount:299.00,payment:"Crédito Personnalité",origin:"fatura"},
    ]);
    setStep("preview");
  };

  const handleFile=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(!file.name.toLowerCase().endsWith(".pdf")){addToast("Selecione um arquivo PDF","error");return;}
    setLoading(true);
    try{
      if(window.pdfjsLib){
        pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const ab=await file.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:ab}).promise;
        let txt="";
        for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);const c=await pg.getTextContent();txt+=c.items.map(i=>i.str).join(" ")+"\n";}
        const lines=txt.split("\n").map(l=>l.trim()).filter(Boolean);
        const res=[];
        for(let i=0;i<lines.length;i++){
          const l=lines[i];
          const dm=l.match(/(\d{2}\/\d{2})/);
          const vm=l.match(/([\d\.]+,\d{2})/);
          if(dm&&vm){
            const v=parseFloat(vm[1].replace(/\./g,"").replace(",","."));
            if(v<=0||v>50000)continue;
            const desc=l.replace(/\d{2}\/\d{2}/,"").replace(/([\d\.]+,\d{2})/,"").trim().replace(/^[-–\s]+/,"").trim();
            if(desc.length<3)continue;
            const[day,mon]=dm[1].split("/");
            res.push({id:"fat"+Date.now()+i,date:`${new Date().getFullYear()}-${mon}-${day}`,description:desc,category:cat(desc),amount:v,payment:"Crédito Personnalité",origin:"fatura"});
          }
        }
        if(res.length===0){addToast("Nenhum lançamento encontrado. Use o exemplo.","error");}
        else{setPreview(res);setStep("preview");}
      }else{addToast("PDF.js não disponível","error");}
    }catch(err){addToast("Erro ao ler PDF: "+err.message,"error");}
    setLoading(false);
  };

  const importAll=()=>{dispatch({type:"ADD_MANY",payload:preview});addToast(preview.length+" transações importadas!","success");setPreview([]);setStep("upload");};

  if(step==="preview")return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement("span",{style:{fontSize:14,fontWeight:600,color:"#fff"}},preview.length+" lançamentos encontrados"),
      React.createElement("button",{onClick:()=>{setPreview([]);setStep("upload");},style:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:13}},"✕ Cancelar")
    ),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:380,overflowY:"auto"}},
      preview.map(t=>React.createElement("div",{key:t.id,style:{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:8,padding:10,display:"flex",alignItems:"center",gap:8}},
        React.createElement("div",{style:{width:6,height:6,borderRadius:"50%",background:COLORS[t.category],flexShrink:0}}),
        React.createElement("div",{style:{flex:1,minWidth:0}},
          React.createElement("div",{style:{fontSize:12,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description),
          React.createElement("span",{style:{fontSize:10,color:COLORS[t.category]}},t.category)
        ),
        React.createElement("span",{style:{fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}},fmt(t.amount)),
        React.createElement("button",{onClick:()=>setPreview(p=>p.filter(x=>x.id!==t.id)),style:{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:14}},"✕")
      ))
    ),
    React.createElement("button",{onClick:importAll,style:{background:"#EC7000",color:"#fff",border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}},"✓ Importar "+preview.length+" transações")
  );

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    React.createElement("div",{style:{background:"#1a1a1a",border:"2px dashed #2a2a2a",borderRadius:12,padding:40,textAlign:"center"}},
      React.createElement("div",{style:{fontSize:36,marginBottom:12}},"📄"),
      React.createElement("p",{style:{color:"#fff",fontSize:14,fontWeight:600,marginBottom:4}},"Upload da Fatura Itaú Personnalité"),
      React.createElement("p",{style:{color:"#444",fontSize:12,marginBottom:16}},"Arquivo PDF da fatura do cartão"),
      React.createElement("label",{style:{background:"#EC7000",color:"#fff",padding:"10px 24px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",display:"inline-block"}},
        loading?"Lendo PDF...":"📎 Selecionar PDF",
        React.createElement("input",{type:"file",accept:".pdf",onChange:handleFile,style:{display:"none"},disabled:loading})
      )
    ),
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
      React.createElement("div",{style:{flex:1,height:1,background:"#2a2a2a"}}),
      React.createElement("span",{style:{fontSize:12,color:"#444"}},"ou"),
      React.createElement("div",{style:{flex:1,height:1,background:"#2a2a2a"}})
    ),
    React.createElement("button",{onClick:loadEx,style:{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#c9a84c",padding:"12px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}},"⭐ Carregar fatura de exemplo"),
    React.createElement("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:10,padding:14}},
      React.createElement("p",{style:{fontSize:11,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:1}},"Como funciona"),
      ["Baixe sua fatura no app Itaú ou internet banking","Faça upload do PDF aqui","O app extrai e categoriza automaticamente","Revise e confirme antes de importar"].map((s,i)=>React.createElement("p",{key:i,style:{fontSize:12,color:"#444",marginBottom:4}},"• "+s))
    )
  );
}

function Export({transactions,addToast}){
  const exp=()=>{
    if(transactions.length===0){addToast("Nenhuma transação","error");return;}
    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.aoa_to_sheet([["Data","Descrição","Categoria","Valor","Pagamento","Origem"],...transactions.map(t=>[t.date,t.description,t.category,t.amount,t.payment,t.origin])]);
    XLSX.utils.book_append_sheet(wb,ws1,"Transações");
    const cm={};transactions.forEach(t=>{if(!cm[t.category])cm[t.category]={total:0,count:0};cm[t.category].total+=t.amount;cm[t.category].count++;});
    const gt=transactions.reduce((s,t)=>s+t.amount,0);
    const ws2=XLSX.utils.aoa_to_sheet([["Categoria","Total R$","% Total","Qtd"],...Object.entries(cm).sort((a,b)=>b[1].total-a[1].total).map(([c,d])=>[c,d.total.toFixed(2),((d.total/gt)*100).toFixed(1)+"%",d.count])]);
    XLSX.utils.book_append_sheet(wb,ws2,"Por Categoria");
    const mm={};transactions.forEach(t=>{const m=t.date.slice(0,7);mm[m]=(mm[m]||0)+t.amount;});
    const ws3=XLSX.utils.aoa_to_sheet([["Mês","Total R$"],...Object.entries(mm).sort().map(([m,v])=>[m,v.toFixed(2)])]);
    XLSX.utils.book_append_sheet(wb,ws3,"Mensal");
    XLSX.writeFile(wb,"financeiro_"+new Date().toISOString().slice(0,10)+".xlsx");
    addToast("Planilha exportada!","success");
  };
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    React.createElement("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:20}},
      React.createElement("div",{style:{fontSize:36,marginBottom:12,textAlign:"center"}},"📊"),
      React.createElement("p",{style:{fontSize:14,fontWeight:600,color:"#fff",marginBottom:4,textAlign:"center"}},"Exportar para Excel"),
      React.createElement("p",{style:{fontSize:12,color:"#444",marginBottom:16,textAlign:"center"}},"Gera planilha com 3 abas completas"),
      React.createElement("button",{onClick:exp,style:{width:"100%",background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}},"⬇ Baixar Planilha .xlsx")
    ),
    React.createElement("div",{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:10,padding:14}},
      [["Aba 1","Todas as transações: data, descrição, categoria, valor"],["Aba 2","Resumo por categoria com % de participação"],["Aba 3","Evolução do gasto total mês a mês"]].map(([t,d])=>
        React.createElement("div",{key:t,style:{display:"flex",gap:10,marginBottom:8}},
          React.createElement("span",{style:{fontSize:11,fontWeight:700,color:"#EC7000",width:36,flexShrink:0}},t),
          React.createElement("span",{style:{fontSize:12,color:"#444"}},d)
        )
      )
    )
  );
}

function App(){
  const[state,dispatch]=useReducer(reducer,{transactions:[],loaded:false});
  const[tab,setTab]=useState("dashboard");
  const[toasts,setToasts]=useState([]);
  const[banner,setBanner]=useState(true);

  const addToast=useCallback((message,type="success")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,message,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);

  useEffect(()=>{
    try{const s=localStorage.getItem("fin_v1");dispatch({type:"LOAD",payload:s?JSON.parse(s):mockData()});}
    catch{dispatch({type:"LOAD",payload:mockData()});}
  },[]);

  const nav=[
    {id:"dashboard",label:"Dashboard",ico:"📊"},
    {id:"add",label:"Adicionar",ico:"➕"},
    {id:"list",label:"Extrato",ico:"📋"},
    {id:"invoice",label:"Fatura",ico:"📄"},
    {id:"export",label:"Exportar",ico:"⬇"},
  ];
  const titles={dashboard:"Dashboard",add:"Nova Transação",list:"Extrato",invoice:"Importar Fatura",export:"Exportar Excel"};

  return React.createElement("div",{style:{minHeight:"100vh",background:"#111",display:"flex",flexDirection:"column"}},
    React.createElement("header",{style:{background:"#0d0d0d",borderBottom:"1px solid #1e1e1e",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:30}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div",{style:{width:30,height:30,background:"#EC7000",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:"#fff"}},"P"),
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:13,fontWeight:700,color:"#fff"}},"Personnalité"),
          React.createElement("div",{style:{fontSize:10,color:"#444"}},"Gestão Financeira")
        )
      ),
      React.createElement("span",{style:{fontSize:14,fontWeight:600,color:"#fff"}},titles[tab]),
      React.createElement("span",{style:{fontSize:11,color:"#333"}},state.transactions.length," itens")
    ),
    banner&&React.createElement("div",{style:{background:"#1a0f00",borderBottom:"1px solid rgba(236,112,0,0.3)",padding:"8px 16px",display:"flex",alignItems:"center",gap:10}},
      React.createElement("span",{style:{fontSize:11,color:"#aaa",flex:1}},
        React.createElement("span",{style:{color:"#EC7000",fontWeight:700}},"Instalar: "),
        "Toque em ⋮ → Adicionar à tela inicial"
      ),
      React.createElement("button",{onClick:()=>setBanner(false),style:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16}},"✕")
    ),
    React.createElement("main",{style:{flex:1,padding:16,overflowY:"auto",paddingBottom:80}},
      !state.loaded
        ?React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:160,color:"#444",gap:8,fontSize:14}},"⟳ Carregando...")
        :React.createElement("div",null,
            tab==="dashboard"&&React.createElement(Dashboard,{transactions:state.transactions}),
            tab==="add"&&React.createElement(AddTx,{dispatch,addToast}),
            tab==="list"&&React.createElement(TxList,{transactions:state.transactions,dispatch,addToast}),
            tab==="invoice"&&React.createElement(Invoice,{dispatch,addToast}),
            tab==="export"&&React.createElement(Export,{transactions:state.transactions,addToast})
          )
    ),
    React.createElement("nav",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#0d0d0d",borderTop:"1px solid #1e1e1e",display:"flex",zIndex:40}},
      nav.map(n=>React.createElement("button",{key:n.id,onClick:()=>setTab(n.id),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 4px",background:"none",border:"none",cursor:"pointer",color:tab===n.id?"#EC7000":"#444",transition:"color 0.2s"}},
        React.createElement("span",{style:{fontSize:20}},n.ico),
        React.createElement("span",{style:{fontSize:9,fontWeight:tab===n.id?700:400}},n.label)
      ))
    ),
    React.createElement(Toast,{toasts})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
